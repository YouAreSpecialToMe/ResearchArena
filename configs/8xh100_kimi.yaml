# ResearchArena — 8× NVIDIA H100 80GB parallel config (Kimi Code)
#
# Runs 8 independent researchers in parallel, each pinned to one H100 GPU.
# Launch with:
#   bash scripts/launch_kimi_gpu.sh
#
# Or run a single researcher on one GPU:
#   CUDA_VISIBLE_DEVICES=0 researcharena run -c configs/8xh100_kimi.yaml --seed "computer vision"

seed_topic: "efficient fine-tuning methods for large language models"
seed_platform: "gpu"
seed_domain: "ml"

# ── Per-platform resource profiles ──
platforms:
  gpu:
    resources:
      total_gpus: 1               # 1 GPU per researcher (parallelism via launch script)
      gpu_ids: "0"                # overridden by CUDA_VISIBLE_DEVICES in launch script
      gpu_type: "NVIDIA H100 80GB HBM3"
      gpu_memory_gb: 80
      total_cpus: 8               # 64 total / 8 researchers
      total_memory_gb: 128        # ~2TB total / 8 researchers
      total_shm_gb: 16
      concurrent_agents: 1
    docker_image: "researcharena/agent:latest"

  cpu:
    resources:
      total_gpus: 0
      total_cpus: 8
      total_memory_gb: 128
      total_shm_gb: 8
      concurrent_agents: 1
    docker_image: "researcharena/agent-cpu:latest"

# ── The agent under test ──
agent:
  type: "kimi"
  # model: omitted — use Kimi CLI default
  runtime: "local"
  max_turns: 200
  ideation_timeout: 3600      # 1 hour
  paper_timeout: 3600         # 1 hour
  docker_image: "researcharena/agent:latest"

experiment:
  max_gpu_hours: 8
  max_experiment_retries_per_idea: 3
  workspace: "outputs/kimi"

paper:
  template: "neurips"
  max_revisions: 0

review:
  accept_threshold: 8
  allow_self_review: true

  paperreview:
    email: "${PAPERREVIEW_EMAIL}"
    email_password: "${PAPERREVIEW_PASSWORD}"
    imap_server: "imap.gmail.com"
    scoring_timeout: 120
    scoring_max_turns: 5

  agents:
    - type: "claude"
      name: "Claude Code"
      model: "claude-opus-4-6"
      review_timeout: 3600

    - type: "codex"
      name: "Codex"
      model: "gpt-5.4"
      review_timeout: 3600

    - type: "kimi"
      name: "Kimi Code"
      review_timeout: 3600

self_review:
  enabled: true
  max_retries_per_gate: 4
  timeout: 900
  abandon_threshold: -2
  thresholds:
    idea: 8
    experiment: 6
    paper: 8
  gates:
    idea: true
    experiment: true
    paper: true

pipeline:
  max_ideas_per_seed: 3
  max_global_steps: 50
