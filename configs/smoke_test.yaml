# Smoke test config — single H200 GPU, minimal budgets, fast verification.
#
# Usage:
#   researcharena run -c configs/smoke_test.yaml

seed_topic: "metric learning"

resources:
  total_gpus: 1
  gpu_ids: "0"
  gpu_type: "NVIDIA H200"
  gpu_memory_gb: 141
  total_cpus: 8
  total_memory_gb: 256
  total_shm_gb: 16
  concurrent_agents: 1

agent:
  type: "claude"
  model: "claude-sonnet-4-6"
  runtime: "local"            # run directly on host (no container)
  max_turns: 50               # reduced from 200
  ideation_timeout: 1800      # 30 min (same as default)
  paper_timeout: 900          # 15 min (vs 1 hour default)
  docker_image: "localhost/researcharena/agent:latest"

experiment:
  max_gpu_hours: 1            # 1 hour (vs 8 default)
  max_experiment_retries_per_idea: 1
  workspace: "outputs/smoke_test"

paper:
  template: "neurips"
  max_revisions: 0            # no revisions — just verify the loop works

review:
  accept_threshold: 6

  paperreview:
    email: ""
    email_password: ""

  # Only use Claude as reviewer for the smoke test (skip codex/kimi/minimax)
  agents:
    - type: "claude"
      name: "Claude Code"
      model: "claude-sonnet-4-6"
      review_timeout: 600     # 10 min

pipeline:
  max_ideas_per_seed: 1       # just one idea
  max_global_steps: 6         # ideation + experiments + paper + review = 4 minimum
