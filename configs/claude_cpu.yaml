# ResearchArena — Claude CPU-only config (Unicorn cluster)
#
# 5 CPU seeds, 128GB RAM, 2 CPUs per job, 2-day time limit.

seed_topic: "data integration and cleaning"
seed_platform: "cpu"
seed_domain: "ml"

platforms:
  cpu:
    resources:
      total_gpus: 0
      total_cpus: 2
      total_memory_gb: 128
      total_shm_gb: 8
      concurrent_agents: 1
    docker_image: "researcharena/agent-cpu:latest"

agent:
  type: "claude"
  model: "claude-opus-4-6"
  runtime: "local"
  max_turns: 200
  ideation_timeout: 3600      # 1 hour
  paper_timeout: 3600
  docker_image: "researcharena/agent-cpu:latest"

experiment:
  max_gpu_hours: 8
  max_experiment_retries_per_idea: 3
  workspace: "outputs/claude_cpu"

paper:
  template: "neurips"
  max_revisions: 2

review:
  accept_threshold: 8
  allow_self_review: true

  paperreview:
    email: "${PAPERREVIEW_EMAIL}"
    email_password: "${PAPERREVIEW_PASSWORD}"
    imap_server: "imap.gmail.com"
    scoring_timeout: 120
    scoring_max_turns: 5

  agents:
    - type: "claude"
      name: "Claude Code"
      model: "claude-opus-4-6"
      review_timeout: 3600

    - type: "codex"
      name: "Codex"
      review_timeout: 3600

    - type: "kimi"
      name: "Kimi Code"
      # model: omitted — use Kimi CLI default
      review_timeout: 3600

self_review:
  enabled: true
  threshold: 6               # score >= this to pass
  max_retries_per_gate: 2    # max times each gate can send back
  timeout: 900               # 15 min per self-review
  gates:
    idea: true
    experiment: true
    paper: true

pipeline:
  max_ideas_per_seed: 3
  max_global_steps: 50
