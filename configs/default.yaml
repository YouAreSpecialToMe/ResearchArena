# AutoResearch — CLI Agent Research Benchmark
#
# Tests whether a CLI agent can autonomously conduct end-to-end ML research:
# come up with an idea, run experiments, write a paper, and get it accepted.
#
# Each agent invocation runs inside a Docker container with GPU access,
# full network, and pre-installed ML packages.

seed_topic: "efficient fine-tuning methods for large language models"

# ── The agent under test ──
agent:
  type: "claude"              # "claude", "codex", "aider", or "custom"
  model: "claude-sonnet-4-6"
  max_turns: 200
  ideation_timeout: 1800      # 30 min
  paper_timeout: 3600         # 1 hour

  # Docker settings
  docker_image: "autoresearch/agent:latest"
  gpus: 1                     # number of GPUs (or "all")
  cpus: 8
  memory_limit: "32g"
  shm_size: "8g"              # shared memory for PyTorch DataLoader

  # Extra env vars to pass into the container (on top of API keys)
  # env:
  #   MY_CUSTOM_VAR: "value"

experiment:
  max_gpu_hours: 4
  max_experiment_retries_per_idea: 3
  workspace: "outputs/runs"

paper:
  template: "neurips"
  max_revisions: 2

review:
  accept_threshold: 6

  # Source 1: paperreview.ai
  paperreview:
    email: ""
    email_password: ""
    imap_server: "imap.gmail.com"
    poll_interval: 60
    max_wait: 3600

  # Source 2: Agent reviewers (NOT the agent under test — these are evaluators)
  agents:
    - name: "Claude Sonnet"
      provider: "anthropic"
      model: "claude-sonnet-4-6"
      temperature: 0.3

    - name: "GPT-4o"
      provider: "openai"
      model: "gpt-4o"
      temperature: 0.3

pipeline:
  max_ideas_per_seed: 5
  max_global_steps: 30
