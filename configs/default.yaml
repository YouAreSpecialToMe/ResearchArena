# ResearchArena — CLI Agent Research Benchmark
#
# Tests whether a CLI agent can autonomously conduct end-to-end ML research.
# Each agent runs inside a Docker container with GPU access.
#
# The agent under test does the research. The other agents review it —
# running in the SAME Docker image with READ-ONLY access to the workspace.
#
# Authentication: CLI agent credentials (e.g., ~/.claude/ for Claude Code
# subscription, ~/.codex/ for Codex) are auto-mounted read-only into the
# container. No API key needed for subscription agents — just run
# `claude login` or `codex login` on the host first.

seed_topic: "efficient fine-tuning methods for large language models"

# ── The agent under test ──
# Change this to benchmark different agents.
agent:
  type: "claude"              # "claude", "codex", "kimi", "minimax", or "custom"
  model: "claude-sonnet-4-6"
  max_turns: 200
  ideation_timeout: 1800      # 30 min
  paper_timeout: 3600         # 1 hour

  # Docker settings (shared by researcher AND reviewer containers)
  docker_image: "researcharena/agent:latest"
  gpus: 1
  cpus: 8
  memory_limit: "32g"
  shm_size: "8g"

experiment:
  max_gpu_hours: 4
  max_experiment_retries_per_idea: 3
  workspace: "outputs/runs"

paper:
  template: "neurips"
  max_revisions: 2

review:
  accept_threshold: 6

  # Source 1: paperreview.ai
  paperreview:
    email: ""
    email_password: ""
    imap_server: "imap.gmail.com"
    poll_interval: 60
    max_wait: 3600

  # Source 2: CLI agent reviewers
  # All agents listed here that are NOT the agent under test become reviewers.
  # E.g., if agent.type = "claude", then codex, kimi, minimax review.
  # Each reviewer runs in the same Docker image with the workspace mounted
  # read-only. They can read code, logs, results — even re-run experiments.
  agents:
    - type: "claude"
      name: "Claude Code"
      model: "claude-sonnet-4-6"
      review_timeout: 1800

    - type: "codex"
      name: "Codex"
      review_timeout: 1800

    - type: "kimi"
      name: "Kimi Code"
      model: "kimi-k2.5"
      review_timeout: 1800

    - type: "minimax"
      name: "Mini-Agent"
      model: "MiniMax-M2.5"
      review_timeout: 1800

pipeline:
  max_ideas_per_seed: 5
  max_global_steps: 30
