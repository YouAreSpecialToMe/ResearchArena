# ResearchArena — CLI Agent Research Benchmark
#
# Tests whether a CLI agent can autonomously conduct end-to-end ML research.
# Each agent runs inside a Docker container with GPU access.
#
# The agent under test does the research. The other agents review it —
# running in the SAME Docker image with READ-ONLY access to the workspace.
#
# Authentication: CLI agent credentials (e.g., ~/.claude/ for Claude Code
# subscription, ~/.codex/ for Codex) are auto-mounted into the container.
# No API key needed for subscription agents — just run `claude login` on
# the host first.

seed_topic: "efficient fine-tuning methods for large language models"

# ── Cluster resources ──
# Total resources available. Per-agent allocation is computed automatically
# as total / concurrent_agents.
resources:
  total_gpus: 4                # number of GPUs (or "all")
  gpu_ids: "0,1,2,3"          # which GPU device IDs to use (comma-separated)
  gpu_type: "NVIDIA A100"     # GPU model name (shown to agent for planning)
  gpu_memory_gb: 80            # per-GPU memory in GB
  total_cpus: 32
  total_memory_gb: 128
  total_shm_gb: 32
  concurrent_agents: 1         # how many agents run at the same time

# ── The agent under test ──
agent:
  type: "claude"              # "claude", "codex", "kimi", "minimax", or "custom"
  model: "claude-sonnet-4-6"
  max_turns: 200
  ideation_timeout: 1800      # 30 min
  paper_timeout: 3600         # 1 hour
  docker_image: "researcharena/agent:latest"

experiment:
  max_gpu_hours: 8
  max_experiment_retries_per_idea: 3
  workspace: "outputs/runs"

paper:
  template: "neurips"
  max_revisions: 2

review:
  accept_threshold: 8            # ≥8 accept, 6 revision, ≤4 reject

  # Source 1: paperreview.ai
  paperreview:
    email: ""
    email_password: ""
    imap_server: "imap.gmail.com"
    poll_interval: 60
    max_wait: 3600

  # Source 2: CLI agent reviewers
  # All agents listed here that are NOT the agent under test become reviewers.
  agents:
    - type: "claude"
      name: "Claude Code"
      model: "claude-sonnet-4-6"
      review_timeout: 1800

    - type: "codex"
      name: "Codex"
      review_timeout: 1800

    - type: "kimi"
      name: "Kimi Code"
      model: "kimi-k2.5"
      review_timeout: 1800

    - type: "minimax"
      name: "Mini-Agent"
      model: "MiniMax-M2.5"
      review_timeout: 1800

pipeline:
  max_ideas_per_seed: 5
  max_global_steps: 30
