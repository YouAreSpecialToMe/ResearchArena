# Smoke test config — 1 hour, 2 CPUs, 128 GB RAM, single database seed.
# Unicorn cluster, Claude CLI subscription (no API key).
#
# Usage:
#   sbatch submit_smoke_test.sh
#   researcharena run -c configs/smoke_test_unicorn.yaml   # local test

seed_topic: "query optimization"
seed_platform: "cpu"
seed_domain: "databases"

platforms:
  cpu:
    resources:
      total_gpus: 0
      total_cpus: 2
      total_memory_gb: 128
      total_shm_gb: 4
      concurrent_agents: 1

agent:
  type: "claude"
  model: "claude-sonnet-4-6"
  runtime: "local"
  max_turns: 50
  ideation_timeout: 1200       # 20 min
  paper_timeout: 900           # 15 min

experiment:
  max_gpu_hours: 1             # experiment time budget in hours (also used for CPU)
  max_experiment_retries_per_idea: 1
  workspace: "outputs/smoke_test_unicorn"

paper:
  template: "sigmod"
  max_revisions: 1

review:
  accept_threshold: 8
  allow_self_review: true
  paperreview:
    email: ""
    email_password: ""
    imap_server: "imap.gmail.com"
    scoring_timeout: 120
    scoring_max_turns: 5
  agents:
    - type: "claude"
      name: "Claude Code"
      model: "claude-sonnet-4-6"
      review_timeout: 900      # 15 min

pipeline:
  max_ideas_per_seed: 1
  max_global_steps: 10
