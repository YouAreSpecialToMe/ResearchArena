# Full run: self-supervised dynamic novel view synthesis
# Machine: 1x H200 (141GB), 8 CPUs, 256GB RAM

seed_topic: "self-supervised dynamic novel view synthesis"
seed_platform: "gpu"
seed_domain: "ml"

platforms:
  gpu:
    resources:
      total_gpus: 1
      gpu_ids: "0"
      gpu_type: "NVIDIA H200"
      gpu_memory_gb: 141
      total_cpus: 8
      total_memory_gb: 256
      total_shm_gb: 16
      concurrent_agents: 1

agent:
  type: "claude"
  model: "claude-opus-4-6"
  runtime: "local"
  max_turns: 200
  ideation_timeout: 3600      # 1 hour
  paper_timeout: 3600         # 1 hour

experiment:
  max_gpu_hours: 8            # 8 hours
  max_experiment_retries_per_idea: 2
  workspace: "outputs/runs/nvs_run"

paper:
  template: "neurips"
  max_revisions: 2

review:
  accept_threshold: 8

  paperreview:
    email: "${PAPERREVIEW_EMAIL}"
    email_password: "${PAPERREVIEW_PASSWORD}"
    imap_server: "imap.gmail.com"
    scoring_timeout: 120
    scoring_max_turns: 5

  allow_self_review: true

  agents:
    - type: "claude"
      name: "Claude Code"
      model: "claude-opus-4-6"
      review_timeout: 3600

pipeline:
  max_ideas_per_seed: 3
  max_global_steps: 30
