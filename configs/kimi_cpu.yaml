# ResearchArena — Kimi CPU-only config (Unicorn cluster)
#
# 5 CPU seeds, 128GB RAM, 2 CPUs per job, 2-day time limit.
# Launch with:
#   sbatch scripts/slurm_kimi_cpu.sh

seed_topic: "data integration and cleaning"
seed_platform: "cpu"
seed_domain: "ml"

platforms:
  cpu:
    resources:
      total_gpus: 0
      total_cpus: 2
      total_memory_gb: 128
      total_shm_gb: 8
      concurrent_agents: 1
    docker_image: "researcharena/agent-cpu:latest"

agent:
  type: "kimi"
  # model: omitted — use Kimi CLI default (kimi-code/kimi-for-coding)
  runtime: "local"
  max_turns: 200
  ideation_timeout: 1800
  paper_timeout: 3600
  docker_image: "researcharena/agent-cpu:latest"

experiment:
  max_gpu_hours: 0
  max_experiment_retries_per_idea: 3
  workspace: "outputs/kimi_cpu"

paper:
  template: "neurips"
  max_revisions: 2

review:
  accept_threshold: 8
  allow_self_review: true

  paperreview:
    email: "${PAPERREVIEW_EMAIL}"
    email_password: "${PAPERREVIEW_PASSWORD}"
    imap_server: "imap.gmail.com"
    scoring_timeout: 120
    scoring_max_turns: 5

  agents:
    - type: "claude"
      name: "Claude Code"
      model: "claude-opus-4-6"
      review_timeout: 3600

pipeline:
  max_ideas_per_seed: 3
  max_global_steps: 20
