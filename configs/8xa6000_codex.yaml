# ResearchArena — Single Codex researcher with 8× NVIDIA A6000 GPUs
#
# One researcher gets all 8 GPUs on the machine.
# Launch with:
#   researcharena run -c configs/8xa6000_codex.yaml --seed "computer vision"

seed_topic: "efficient fine-tuning methods for large language models"
seed_platform: "gpu"
seed_domain: "ml"

# ── Per-platform resource profiles ──
platforms:
  gpu:
    resources:
      total_gpus: 8
      gpu_ids: "0,1,2,3,4,5,6,7"
      gpu_type: "NVIDIA RTX A6000"
      gpu_memory_gb: 48
      total_cpus: 32
      total_memory_gb: 480
      total_shm_gb: 64
      concurrent_agents: 1
    docker_image: "researcharena/agent:latest"

  cpu:
    resources:
      total_gpus: 0
      total_cpus: 32
      total_memory_gb: 480
      total_shm_gb: 16
      concurrent_agents: 1
    docker_image: "researcharena/agent-cpu:latest"

# ── The agent under test ──
agent:
  type: "codex"
  model: "gpt-5.4"
  runtime: "local"
  max_turns: 200
  ideation_timeout: 3600      # 1 hour
  paper_timeout: 3600         # 1 hour
  docker_image: "researcharena/agent:latest"

experiment:
  max_gpu_hours: 8
  max_experiment_retries_per_idea: 3

  workspace: "outputs/8xa6000_codex"

paper:
  template: "neurips"
  max_revisions: 2

review:
  accept_threshold: 8
  allow_self_review: true       # self-review for faster turnaround

  paperreview:
    email: "${PAPERREVIEW_EMAIL}"
    email_password: "${PAPERREVIEW_PASSWORD}"
    imap_server: "imap.gmail.com"
    scoring_timeout: 120
    scoring_max_turns: 5

  agents:
    - type: "claude"
      name: "Claude Code"
      model: "claude-opus-4-6"
      review_timeout: 3600

    - type: "codex"
      name: "Codex"
      model: "gpt-5.4"
      review_timeout: 3600

    - type: "kimi"
      name: "Kimi Code"
      # model: omitted — use Kimi CLI default
      review_timeout: 3600

self_review:
  enabled: true
  max_retries_per_gate: 4
  timeout: 900
  thresholds:
    idea: 8
    experiment: 6
    paper: 8
  gates:
    idea: true
    experiment: true
    paper: true

pipeline:
  max_ideas_per_seed: 3
  max_global_steps: 50
