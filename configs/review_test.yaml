# Test config for review stage with multiple agents
# Usage: researcharena review-only -c configs/review_test.yaml /tmp/ra_nvs_run/idea_01/

seed_topic: "test"
seed_platform: "gpu"
seed_domain: "ml"

platforms:
  gpu:
    resources:
      total_gpus: 1
      gpu_ids: "0"
      gpu_type: "NVIDIA H200"
      gpu_memory_gb: 141
      total_cpus: 8
      total_memory_gb: 256
      total_shm_gb: 16
      concurrent_agents: 1

agent:
  type: "claude"
  model: "claude-sonnet-4-6"
  runtime: "local"

experiment:
  max_gpu_hours: 1
  workspace: "/tmp/review_test"

paper:
  template: "neurips"

review:
  accept_threshold: 8
  allow_self_review: true

  paperreview:
    email: ""           # skip paperreview.ai for this test
    email_password: ""

  agents:
    - type: "claude"
      name: "Claude Code"
      model: "claude-opus-4-6"
      review_timeout: 3600

    - type: "codex"
      name: "Codex"
      review_timeout: 3600

    - type: "kimi"
      name: "Kimi Code"
      review_timeout: 3600
