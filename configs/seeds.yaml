# Seed fields for benchmarking.
#
# Each seed specifies:
#   - name: the research area (agent decides specific problem)
#   - conferences: target venues for this area
#   - platform: "gpu" or "cpu" — determines resource allocation
#   - domain: selects which guideline templates the agent reads
#       ml        — ML/AI conferences (ICLR, NeurIPS, ICML, CVPR, ACL, etc.)
#       systems   — systems + architecture (OSDI, SOSP, ISCA, ASPLOS, etc.)
#       databases — databases (SIGMOD, VLDB, ICDE)
#       pl        — programming languages (PLDI, POPL, OOPSLA, ICFP)
#       theory    — theoretical CS (STOC, FOCS, SODA)
#       security  — security + crypto (CCS, S&P, USENIX Security)
#
# Platform assignment rationale:
#   GPU → areas that typically require training neural networks (NLP, CV, graphics, generative models)
#   CPU → areas where experiments are analytical, symbolic, or systems-level (DB, OS, PL, theory)
#
# Usage:
#   researcharena bench --agent claude                     # all seeds
#   researcharena bench --agent claude --platform gpu      # GPU seeds only
#   researcharena bench --agent claude --conference iclr   # ICLR seeds only
#   researcharena bench --field "computer vision"          # single field
#   researcharena list-seeds
#   researcharena list-seeds --platform cpu
#   researcharena list-seeds --conference sigmod

seeds:

