# Seed fields for benchmarking.
#
# Sourced from ICLR 2026 Call for Papers topic list.
# Each seed is a field name — the agent decides what specific problem
# to work on. That's the research ability we're testing.
#
# Usage:
#   autoresearch bench --agent claude
#   autoresearch bench --field "reinforcement learning"
#   autoresearch list-seeds

seeds:
  # ── Representation Learning ──
  - unsupervised representation learning
  - self-supervised representation learning
  - semi-supervised representation learning
  - supervised representation learning

  # ── Learning Paradigms ──
